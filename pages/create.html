<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立体くん作成ページ</title>
	<link rel="stylesheet" href="../css/style.css">
</head>
<body>
	<div id="toolbar">
		<button class="shape-btn" data-shape="box">立方体</button>
		<button class="shape-btn" data-shape="sphere">球</button>
		<button class="shape-btn" data-shape="cylinder">円柱</button>
		<button class="shape-btn" data-shape="cone">円錐</button>
		<button class="shape-btn" data-shape="torus">トーラス</button>
		<button class="shape-btn" data-shape="tetrahedron">四面体</button>
		<button class="shape-btn" data-shape="octahedron">八面体</button>
		<button class="shape-btn" data-shape="dodecahedron">十二面体</button>
		<button class="shape-btn" data-shape="icosahedron">二十面体</button>
	</div>
	<script type="module" src="../src/main.js"></script>
</body>
</html>
