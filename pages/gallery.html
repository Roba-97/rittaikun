<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立体くん - ギャラリールーム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/gallery.css">
</head>
<body>
  <div class="container-fluid p-0 bg-body">
    <header class="mb-5 p-5 glass-panel">
      <div class="container d-flex flex-row justify-content-between align-items-center">
        <h1 class="mb-0 display-5 fw-bold text-white">Gallery Room</h1>
        <div class="d-flex gap-3">
          <a href="create.html" class="btn btn-create py-3 px-4 rounded-pill">作品製作体験に参加</a>
          <a href="/index.html" class="btn btn-entrance py-3 px-4 rounded-pill">エントランスに戻る</a>
        </div>
      </div>
    </header>
    <div class="container mb-5 p-0">
      <div id="gallery-container" class="row row-cols-1 row-cols-md-2 g-5"></div>
      <div id="loading-sentinel" class="text-center mt-5 mb-5">
        <div id="loading-spinner" class="spinner-border text-secondary" role="status" style="display: none;">
          <span class="visually-hidden">読み込み中...</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/gallery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
