<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>立体くん - ギャラリールーム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container my-4">
    <header class="d-flex flex-row justify-content-between align-items-center mb-4">
      <h1 class="h3">ギャラリールーム</h1>
      <div class="d-flex gap-3">
        <a href="./create.html" class="btn btn-primary">作品制作</a>
        <a href="../index.html" class="btn btn-primary">エントランス</a>
      </div>
    </header>
    <div id="gallery-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-3"></div>
  </div>
  <script>
    // ギャラリーデモ用スクリプト
    const galleryContainer = document.getElementById('gallery-container');
    // 10回繰り返し処理
    for (let i = 1; i <= 10; i++) {
      // 新しいdiv要素（col）を作成
      const colDiv = document.createElement('div');
      colDiv.className = 'col';
      // 中身のHTML構造を定義
      colDiv.innerHTML =
        `
        <a href="./showcase.html">
          <img src="https://placehold.jp/300x300.png" class="img-fluid" alt="作品${i}">
        </a>
        <p>作品名 ${i}</p>
        `;
        // コンテナに追加
      galleryContainer.appendChild(colDiv);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
